version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartdoor
      POSTGRES_USER: smartdoor
      POSTGRES_PASSWORD: smartdoor123
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdoor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - smartdoor-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - smartdoor-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: smartdoor
      MINIO_ROOT_PASSWORD: smartdoor123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - smartdoor-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "Running Prisma migrations..."
        npx prisma migrate deploy
        echo "Starting application..."
        exec npm run dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://smartdoor:smartdoor123@postgres:5432/smartdoor
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: smartdoor
      MINIO_SECRET_KEY: smartdoor123
      MINIO_BUCKET: smartdoor
      JWT_SECRET: test-secret-key-for-dev
      CORS_ORIGINS: "*"
      TZ: Asia/Shanghai
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - upload-data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - smartdoor-network

volumes:
  postgres-data:
  redis-data:
  minio-data:
  upload-data:

networks:
  smartdoor-network:
    driver: bridge
