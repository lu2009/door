
x-common-env: &common-env
  NODE_ENV: ${NODE_ENV:-production}
  DATABASE_URL: postgresql://smartdoor:smartdoor123@postgres:5432/smartdoor
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: smartdoor
  MINIO_SECRET_KEY: smartdoor123
  MINIO_BUCKET: smartdoor
  JWT_SECRET: ${JWT_SECRET:-change-in-production}
  CORS_ORIGINS: ${CORS_ORIGINS:-*}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartdoor
      POSTGRES_USER: smartdoor
      POSTGRES_PASSWORD: smartdoor123
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdoor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - smartdoor-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - smartdoor-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: smartdoor
      MINIO_ROOT_PASSWORD: smartdoor123
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - smartdoor-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      <<: *common-env
      TZ: Asia/Shanghai
      PORT: 5000
    env_file:
      - .env
    volumes:
      - upload-data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/healthz',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - smartdoor-network
    # Scale horizontally: docker compose up -d --scale backend=3

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - smartdoor-network

volumes:
  postgres-data:
  redis-data:
  minio-data:
  upload-data:

networks:
  smartdoor-network:
    driver: bridge
